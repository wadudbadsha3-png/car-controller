<script>
  // BLE & Control Logic
  let bleDevice = null, bleChar = null, bleConnected = false;
  let throttle = null, turn = null, sendInterval = null;
  let autoMode = false, autoTimer = null, autoStepIdx = 0;
  let speedVal = 0, speedUpInt = null, speedDownInt = null;
  
  const AUTO_SEQ = [
    { cmd: 'F', dur: 1100 }, { cmd: 'S', dur: 250 }, { cmd: 'L', dur: 550 },
    { cmd: 'F', dur: 900 }, { cmd: 'S', dur: 250 }, { cmd: 'R', dur: 500 },
    { cmd: 'F', dur: 1300 }, { cmd: 'S', dur: 300 }
  ];

  function updateHighlights() {
    document.getElementById('btnF').className = 'jbtn' + (throttle === 'F' ? (turn ? ' jcombo' : ' jpressed') : '');
    document.getElementById('btnB').className = 'jbtn' + (throttle === 'B' ? (turn ? ' jcombo' : ' jpressed') : '');
    document.getElementById('btnL').className = 'jbtn' + (turn === 'L' ? (throttle ? ' jcombo' : ' jpressed') : '');
    document.getElementById('btnR').className = 'jbtn' + (turn === 'R' ? (throttle ? ' jcombo' : ' jpressed') : '');
    const modeSpan = document.getElementById('modeLabel');
    if (throttle === 'F') modeSpan.className = 'mode-indicator mode-f';
    else if (throttle === 'B') modeSpan.className = 'mode-indicator mode-b';
    else modeSpan.className = 'mode-indicator';
    modeSpan.textContent = throttle === 'F' ? 'Forward' : (throttle === 'B' ? 'Reverse' : 'Neutral');
  }

  function getCommand() {
    if (throttle === 'F' && turn === 'L') return 'G';
    if (throttle === 'F' && turn === 'R') return 'H';
    if (throttle === 'B' && turn === 'L') return 'I';
    if (throttle === 'B' && turn === 'R') return 'J';
    if (throttle === 'F') return 'F';
    if (throttle === 'B') return 'B';
    if (turn === 'L') return 'L';
    if (turn === 'R') return 'R';
    return 'S';
  }

  // উন্নত sendCommand ফাংশন - ডিবাগ সহ
  async function sendCommand(cmd) {
    document.getElementById('cmdLog').textContent = cmd;
    console.log(`Sending command: ${cmd}`); // ডিবাগ
    
    if (window.bleChar && window.bleConnected) {
      try {
        // পদ্ধতি 1: String to ArrayBuffer
        const encoder = new TextEncoder();
        const encoded = encoder.encode(cmd);
        
        // পদ্ধতি 2: Uint8Array সরাসরি ব্যবহার করুন
        const data = new Uint8Array([cmd.charCodeAt(0)]);
        
        console.log(`Sending bytes: ${Array.from(data)}`); // ডিবাগ
        
        await window.bleChar.writeValue(data);
        console.log(`Command "${cmd}" sent successfully`); // সফল হলে দেখাবে
      } catch(e) {
        console.error('Write failed:', e);
        document.getElementById('cmdLog').textContent = `Error: ${e.message}`;
      }
    } else {
      console.log('BLE not connected, command ignored');
      // বিকল্প: কমান্ড সংরক্ষণ করে পরে পাঠানো
    }
  }

  function startLoop() {
    if (sendInterval) clearInterval(sendInterval);
    sendInterval = setInterval(() => { 
      if (!autoMode) {
        const cmd = getCommand();
        if (cmd !== 'S' || (throttle || turn)) {
          sendCommand(cmd);
        } else if (cmd === 'S' && !throttle && !turn) {
          sendCommand('S');
        }
      }
    }, 100); // 100ms interval (120 এর বদলে)
  }

  function stopLoop() {
    if (sendInterval) { clearInterval(sendInterval); sendInterval = null; }
  }

  window.setThrottle = function(dir) {
    if (autoMode) return;
    throttle = dir;
    if (dir === 'F') {
      if (speedUpInt) clearInterval(speedUpInt);
      if (speedDownInt) clearInterval(speedDownInt);
      speedUpInt = setInterval(() => { speedVal = Math.min(speedVal + 2, 28); document.getElementById('spdMeter').innerText = speedVal; }, 70);
    } else if (dir === 'B') {
      if (speedUpInt) clearInterval(speedUpInt);
      if (speedDownInt) clearInterval(speedDownInt);
      speedDownInt = setInterval(() => { speedVal = Math.max(speedVal - 2, 0); document.getElementById('spdMeter').innerText = speedVal; }, 60);
    }
    if (!sendInterval) startLoop();
    updateHighlights();
    sendCommand(getCommand());
  };

  window.releaseThrottle = function() {
    if (autoMode) return;
    throttle = null;
    if (speedUpInt) { clearInterval(speedUpInt); speedUpInt = null; }
    let dec = setInterval(() => {
      speedVal = Math.max(speedVal - 4, 0);
      document.getElementById('spdMeter').innerText = speedVal;
      if (speedVal === 0) clearInterval(dec);
    }, 60);
    if (!turn) { stopLoop(); sendCommand('S'); }
    else { if (!sendInterval) startLoop(); sendCommand(getCommand()); }
    updateHighlights();
  };

  window.setTurn = function(dir) {
    if (autoMode) return;
    turn = dir;
    if (!sendInterval) startLoop();
    updateHighlights();
    sendCommand(getCommand());
  };

  window.releaseTurn = function() {
    if (autoMode) return;
    turn = null;
    if (!throttle) { stopLoop(); sendCommand('S'); }
    else { if (!sendInterval) startLoop(); sendCommand(getCommand()); }
    updateHighlights();
  };

  window.emergencyStop = function() {
    if (autoMode) { toggleAuto(); return; }
    throttle = null; turn = null;
    if (speedUpInt) clearInterval(speedUpInt);
    if (speedDownInt) clearInterval(speedDownInt);
    speedVal = 0; document.getElementById('spdMeter').innerText = '0';
    stopLoop();
    sendCommand('S');
    updateHighlights();
  };

  window.sendAux = function(c) { if (!autoMode) sendCommand(c); };

  function runAutoStep() {
    if (!autoMode) return;
    const step = AUTO_SEQ[autoStepIdx % AUTO_SEQ.length];
    sendCommand(step.cmd);
    autoTimer = setTimeout(() => { autoStepIdx++; runAutoStep(); }, step.dur);
  }

  window.toggleAuto = function() {
    autoMode = !autoMode;
    if (autoMode) {
      document.getElementById('autoBtn').classList.add('auto-on');
      document.getElementById('autoLbl').innerText = 'Auto ON';
      document.getElementById('autoBox').classList.add('visible');
      document.getElementById('leftStick').classList.add('disabled');
      document.getElementById('rightStick').classList.add('disabled');
      if (sendInterval) stopLoop();
      throttle = null; turn = null;
      updateHighlights();
      speedVal = 0; document.getElementById('spdMeter').innerText = '0';
      autoStepIdx = 0;
      runAutoStep();
    } else {
      document.getElementById('autoBtn').classList.remove('auto-on');
      document.getElementById('autoLbl').innerText = 'Auto';
      document.getElementById('autoBox').classList.remove('visible');
      document.getElementById('leftStick').classList.remove('disabled');
      document.getElementById('rightStick').classList.remove('disabled');
      if (autoTimer) clearTimeout(autoTimer);
      sendCommand('S');
    }
  };

  function attachRanges() {
    const fwd = document.getElementById('fwdSpd'), rev = document.getElementById('revSpd');
    const zt = document.getElementById('ztSpd'), mt = document.getElementById('mtSpd');
    const obs = document.getElementById('obsDist'), deb = document.getElementById('debounce');
    fwd.oninput = () => document.getElementById('fwdVal').innerText = fwd.value;
    rev.oninput = () => document.getElementById('revVal').innerText = rev.value;
    zt.oninput = () => document.getElementById('ztVal').innerText = zt.value;
    mt.oninput = () => document.getElementById('mtVal').innerText = mt.value;
    obs.oninput = () => document.getElementById('obsLabel').innerText = obs.value + ' cm';
    deb.oninput = () => document.getElementById('debVal').innerText = deb.value + ' ms';
    fwd.dispatchEvent(new Event('input'));
    rev.dispatchEvent(new Event('input'));
    zt.dispatchEvent(new Event('input'));
    mt.dispatchEvent(new Event('input'));
    obs.dispatchEvent(new Event('input'));
    deb.dispatchEvent(new Event('input'));
  }

  window.toggleMenu = function() {
    const menu = document.getElementById('settingsMenu');
    const btn = document.getElementById('threeDot');
    menu.classList.toggle('open');
    btn.classList.toggle('open');
  };

  // উন্নত BLE কানেকশন ফাংশন
  window.connectBLE = async function() {
    if (window.bleConnected && window.bleDevice) {
      if (window.bleDevice.gatt.connected) window.bleDevice.gatt.disconnect();
      window.bleConnected = false; window.bleChar = null;
      document.getElementById('btPill').classList.remove('connected');
      document.getElementById('btLbl').innerText = 'Connect';
      document.getElementById('cmdLog').textContent = 'Disconnected';
      return;
    }
    
    if (!navigator.bluetooth) { 
      alert('This browser does not support Web Bluetooth. Please use Chrome or Edge on Android.');
      return;
    }
    
    try {
      document.getElementById('cmdLog').textContent = 'Scanning...';
      console.log('Scanning for HC devices...');
      
      // HC-05/HC-06 ডিভাইস খুঁজুন
      const device = await navigator.bluetooth.requestDevice({
        acceptAllDevices: false,
        filters: [
          { namePrefix: 'HC' },      // HC-05, HC-06
          { namePrefix: 'JDY' },     // JDY-31
          { namePrefix: 'BT' }       // কিছু HC মডেল BT দিয়ে শুরু
        ],
        optionalServices: [
          '0000ffe0-0000-1000-8000-00805f9b34fb',  // HC-05 standard
          '0000fff0-0000-1000-8000-00805f9b34fb'   // Alternative
        ]
      });
      
      console.log('Device selected:', device.name);
      document.getElementById('cmdLog').textContent = `Connecting to ${device.name}...`;
      
      const server = await device.gatt.connect();
      console.log('GATT connected');
      
      // প্রথমে সাধারণ সার্ভিস চেষ্টা করুন
      let serviceUUID = '0000ffe0-0000-1000-8000-00805f9b34fb';
      let characteristicUUID = '0000ffe1-0000-1000-8000-00805f9b34fb';
      
      let service, characteristic;
      
      try {
        service = await server.getPrimaryService(serviceUUID);
        characteristic = await service.getCharacteristic(characteristicUUID);
        console.log('Found standard HC-05 service/characteristic');
      } catch(e) {
        console.log('Standard UUID not found, trying alternative...');
        // বিকল্প UUID চেষ্টা করুন
        serviceUUID = '0000fff0-0000-1000-8000-00805f9b34fb';
        characteristicUUID = '0000fff2-0000-1000-8000-00805f9b34fb';
        service = await server.getPrimaryService(serviceUUID);
        characteristic = await service.getCharacteristic(characteristicUUID);
        console.log('Found alternative service/characteristic');
      }
      
      window.bleChar = characteristic;
      window.bleConnected = true;
      window.bleDevice = device;
      
      document.getElementById('btPill').classList.add('connected');
      document.getElementById('btLbl').innerText = 'Connected';
      document.getElementById('cmdLog').textContent = 'Ready - Test with joystick!';
      
      // ডিসকানেক্ট হ্যান্ডলার
      device.addEventListener('gattserverdisconnected', () => {
        console.log('Device disconnected');
        window.bleConnected = false;
        window.bleChar = null;
        document.getElementById('btPill').classList.remove('connected');
        document.getElementById('btLbl').innerText = 'Connect';
        document.getElementById('cmdLog').textContent = 'Disconnected';
      });
      
      // টেস্ট কমান্ড পাঠান
      setTimeout(() => {
        sendCommand('S');
        console.log('Test stop command sent');
      }, 500);
      
    } catch(e) {
      console.error('BLE Error:', e);
      document.getElementById('cmdLog').textContent = `Error: ${e.message}`;
      alert(`Connection failed: ${e.message}\n\nMake sure:\n1. Bluetooth is ON\n2. HC-05 is powered\n3. No other app is connected`);
    }
  };

  attachRanges();
  
  // পেজ লোড হলে স্টপ কমান্ড পাঠান
  window.addEventListener('load', () => {
    console.log('Page loaded, ready to connect');
    document.getElementById('cmdLog').textContent = 'Click Connect';
  });
</script>
